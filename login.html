<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Ateliê Pro Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
        :root { --primary: #C8365A; --bg: #0f172a; --card: #1e293b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background: var(--card); padding: 40px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 400px; text-align: center; }
        .logo { font-size: 24px; font-weight: 700; color: var(--primary); margin-bottom: 32px; }
        .form-group { text-align: left; margin-bottom: 20px; }
        .form-group label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 8px; }
        .form-group input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: #0f172a; color: white; }
        .btn-login { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: transform 0.2s; }
        .btn-login:hover { transform: translateY(-2px); }
        .error-msg { color: #ef4444; font-size: 14px; margin-top: 16px; display: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">Ateliê Pro Admin</div>
        <form id="loginForm">
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" id="email" required placeholder="seu@email.com">
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-login">Acessar Dashboard</button>
            <div id="error" class="error-msg">Erro ao fazer login. Verifique suas credenciais.</div>
        </form>
    </div>

    <script>
        const SUPABASE_URL = 'https://sdnnpgeynzqwuruvanja.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Hbv2XnAyGQF87ma1nUJIFg_Gwhgb3sP';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);


        const loginForm = document.getElementById('loginForm');
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error');

            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

            if (error) {
                errorDiv.innerText = error.message;
                errorDiv.style.display = 'block';
            } else {
                window.location.href = 'admin.html';
            }
        });
    </script>
</body>
</html>
